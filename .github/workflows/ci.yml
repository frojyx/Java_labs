name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-test-sonarcloud:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect project directory
        run: |
          if [ -f "pom.xml" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          elif [ -f "demo/pom.xml" ]; then
            echo "PROJECT_DIR=demo" >> "$GITHUB_ENV"
          else
            echo "pom.xml not found in repository root or demo/"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable (if present)
        run: |
          if [ -f "${PROJECT_DIR}/mvnw" ]; then
            chmod +x "${PROJECT_DIR}/mvnw"
          fi

      - name: Build + lint + tests + JaCoCo
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "mvnw" ]; then
            ./mvnw -B clean verify
          else
            mvn -B clean verify
          fi

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_PROJECT_KEY != '' }}
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f "mvnw" ]; then
            ./mvnw -B sonar:sonar \
              -Dsonar.token="${SONAR_TOKEN}" \
              -Dsonar.host.url="${SONAR_HOST_URL}" \
              -Dsonar.organization="${SONAR_ORGANIZATION}" \
              -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
              -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          else
            mvn -B sonar:sonar \
              -Dsonar.token="${SONAR_TOKEN}" \
              -Dsonar.host.url="${SONAR_HOST_URL}" \
              -Dsonar.organization="${SONAR_ORGANIZATION}" \
              -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
              -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          fi
