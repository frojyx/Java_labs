# Keep analysis focused on project sources
sonar.sources=src/main/java
sonar.tests=src/test/java

# JaCoCo XML report path generated by Maven
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Count coverage only for service layer
sonar.coverage.inclusions=src/main/java/com/example/demo/service/**
